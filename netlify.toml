# Roundly stays a static single-file app served from the repo root.
# The only server-side piece is a tiny proxy for the NPI (doctor) registry,
# which the browser cannot call directly because NPPES sends no CORS headers.
[build]
  publish = "."

[functions]
  directory = "netlify/functions"

# Security headers. The CSP's connect-src/img-src/script-src lists are an
# enforced allowlist of every host the app may talk to — if a data flow isn't
# listed here, the browser blocks it. Any new external service must be added
# here deliberately (and, since visits contain patient data, weighed for HIPAA
# before it ships).
#   - script-src 'unsafe-inline' is required: the whole app is inline JS in
#     index.html (single-file rule). geocoding.geo.census.gov is JSONP, so it
#     loads as a <script>, not a fetch.
#   - connect-src: Supabase (data + auth), OSRM (route line/mileage), Photon
#     (address autocomplete), Open-Meteo (weather at the clinician's own base).
#   - img-src: map tiles (ESRI/OSM/CARTO) + the Google account avatar.
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), payment=(), usb=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://geocoding.geo.census.gov; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob: https://server.arcgisonline.com https://services.arcgisonline.com https://tile.openstreetmap.org https://*.basemaps.cartocdn.com https://*.googleusercontent.com; connect-src 'self' https://wxhjfeorwwvruibuvgta.supabase.co wss://wxhjfeorwwvruibuvgta.supabase.co https://router.project-osrm.org https://photon.komoot.io https://api.open-meteo.com; worker-src 'self'; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"

# publish = "." serves the whole repo root, which would otherwise expose repo
# internals as public URLs (DB schema + RLS policy names, planning docs, the
# function source, collaborator details in CLAUDE.md). Block those paths with a
# forced 404 (force = true is required to override real files that exist on disk).
# The app only ever serves index.html, manifest.json, and /.netlify/functions/*,
# none of which match these rules.
[[redirects]]
  from = "/supabase/*"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/netlify/*"
  to = "/index.html"
  status = 404
  force = true

# Netlify splats only match as a trailing wildcard, so the /supabase/* and
# /netlify/* rules above cover those trees, but root-level files need explicit
# entries rather than a "/*.md"-style suffix glob (which never matches).
[[redirects]]
  from = "/supabase_schema.sql"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/CLAUDE.md"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/PLAN.md"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/package.json"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/package-lock.json"
  to = "/index.html"
  status = 404
  force = true
